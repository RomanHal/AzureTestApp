name: Build and Pack Container (Free Only)

on:
  push:
    branches: [ "master" ]

env:
  REGISTRY: ghcr.io
  # Converts your username/repo into the docker image name automatically
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase image name
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"


      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./AzureTestApp/Dockerfile
          push: true
          # Lowercase the tags string to prevent case-sensitive errors
          tags: ghcr.io/${{ env.IMAGE_OWNER }}/azure-test-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
